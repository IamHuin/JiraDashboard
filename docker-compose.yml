services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: jira-app
    working_dir: /var/www
    volumes:
      - .:/var/www

    depends_on:
      - db

  nginx:
    image: mirror.gcr.io/library/nginx:latest
    container_name: jira-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  db:
    image: mirror.gcr.io/library/mariadb:10.4
    ports: [ "3306:3306" ]
    container_name: jira-mariadb
    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: jira_dashboard
      MARIADB_USER: jira
      MARIADB_PASSWORD: secret

    volumes:
      - jira_data:/var/lib/mysql

volumes:
  jira_data:
    name: jira_data
    external: true